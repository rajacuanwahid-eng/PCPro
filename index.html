<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallel Channel Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 flex items-start justify-center p-6">

  <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-lg">

    <h1 class="text-center text-blue-600 text-lg font-semibold border-b border-gray-200 pb-3 mb-5">
      Parallel Channel Copy
    </h1>

    <!-- Harga #1 & #2 -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">Harga #1 (Asli)</label>
        <input type="number" id="p1" step="any" placeholder="4548.350"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 mb-1">Harga #2 (Asli)</label>
        <input type="number" id="p2" step="any" placeholder="4404.375"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
      </div>
    </div>

    <!-- Offset -->
    <div class="mb-4">
      <label class="block text-xs font-semibold text-gray-500 mb-1">Price Offset (Lebar Kanal)</label>
      <input type="number" id="offset" step="any" placeholder="-183.981"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
    </div>

    <!-- Stacking -->
    <div class="flex items-center gap-3 mb-5">
      <label class="text-xs font-semibold text-gray-500 whitespace-nowrap">Jumlah Stacking (1–10)</label>
      <input type="number" id="stacking" value="1" min="1" max="10" step="1"
        class="w-20 border border-gray-300 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
    </div>

    <!-- Buttons -->
    <div class="grid grid-cols-3 gap-2 mb-5">
      <button onclick="hitung()"
        class="col-span-2 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold text-sm py-2.5 rounded-lg transition-all">
        Hitung &amp; Tampilkan
      </button>
      <button onclick="resetForm()"
        class="bg-gray-100 hover:bg-gray-200 active:scale-95 text-gray-600 font-semibold text-sm py-2.5 rounded-lg transition-all">
        Reset
      </button>
    </div>

    <!-- Results -->
    <div id="results-grid" class="grid grid-cols-2 gap-4"></div>

  </div>

  <!-- Toast -->
  <div id="toast"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white text-sm px-5 py-2.5 rounded-full opacity-0 pointer-events-none transition-opacity duration-300 z-50">
    Tersalin ke Clipboard!
  </div>

  <script>
    function priceLine(id, label, val) {
      return `
        <div class="flex items-center justify-between bg-white border border-gray-200 rounded-md px-2 py-1.5 mb-1.5">
          <span class="text-xs text-gray-400 w-5">${label}</span>
          <span id="${id}" class="font-mono text-sm font-semibold text-gray-800 flex-1 text-center">${val}</span>
          <button onclick="copyVal('${id}')"
            class="text-xs bg-gray-100 hover:bg-gray-200 active:scale-95 border border-gray-300 text-gray-500 px-2 py-0.5 rounded transition-all">
            Copy
          </button>
        </div>`;
    }

    function hitung() {
      const p1 = parseFloat(document.getElementById('p1').value);
      const p2 = parseFloat(document.getElementById('p2').value);
      const offset = parseFloat(document.getElementById('offset').value);
      const stacking = Math.min(10, Math.max(1, parseInt(document.getElementById('stacking').value) || 1));

      if (isNaN(p1) || isNaN(p2) || isNaN(offset)) {
        alert('Harap masukkan angka yang valid!');
        return;
      }

      const abs = Math.abs(offset);
      let upHTML = '', downHTML = '';

      for (let i = 1; i <= stacking; i++) {
        const layerLabel = stacking > 1
          ? `<div class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1 mt-2">Layer ${i}</div>`
          : '';
        upHTML   += layerLabel + priceLine(`u1_${i}`, '#1', (p1 + abs * i).toFixed(3)) + priceLine(`u2_${i}`, '#2', (p2 + abs * i).toFixed(3));
        downHTML += layerLabel + priceLine(`d1_${i}`, '#1', (p1 - abs * i).toFixed(3)) + priceLine(`d2_${i}`, '#2', (p2 - abs * i).toFixed(3));
      }

      document.getElementById('results-grid').innerHTML = `
        <div class="bg-green-50 border border-green-200 rounded-xl p-3">
          <div class="text-xs font-bold text-green-700 uppercase tracking-wide mb-2">↑ Ke Atas</div>
          ${upHTML}
        </div>
        <div class="bg-red-50 border border-red-200 rounded-xl p-3">
          <div class="text-xs font-bold text-red-700 uppercase tracking-wide mb-2">↓ Ke Bawah</div>
          ${downHTML}
        </div>`;
    }

    function copyVal(id) {
      const el = document.getElementById(id);
      if (!el) return;
      navigator.clipboard.writeText(el.innerText).then(showToast);
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.remove('opacity-0');
      t.classList.add('opacity-100');
      setTimeout(() => {
        t.classList.remove('opacity-100');
        t.classList.add('opacity-0');
      }, 1800);
    }

    function resetForm() {
      ['p1', 'p2', 'offset'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('stacking').value = '1';
      document.getElementById('results-grid').innerHTML = '';
    }
  </script>

</body>
</html>
