
<style>
  .card { background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 12px; padding: 24px; max-width: 520px; margin: 0 auto; }
  h3 { margin: 0 0 20px; color: var(--text-accent); font-size: 16px; font-weight: 500; text-align: center; border-bottom: 0.5px solid var(--border); padding-bottom: 12px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .input-group { margin-bottom: 12px; }
  label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text-secondary); font-weight: 500; }
  input[type=number] { width: 100%; padding: 8px 10px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); box-sizing: border-box; font-size: 14px; background: var(--surface-1); color: var(--text-primary); }
  input[type=number]:focus { border-color: var(--border-accent); outline: none; }
  .stacking-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .stacking-row label { margin: 0; white-space: nowrap; }
  .stacking-row input[type=number] { width: 70px; }
  .btn-group { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
  .btn-calc { background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: var(--radius); padding: 10px; font-weight: 500; font-size: 14px; cursor: pointer; }
  .btn-calc:hover { background: var(--fill-accent-hover); }
  .btn-reset { background: var(--surface-1); color: var(--text-secondary); border: 0.5px solid var(--border-strong); border-radius: var(--radius); padding: 10px; font-size: 14px; cursor: pointer; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
  .result-box { padding: 12px; border-radius: var(--radius); font-size: 13px; }
  .up { background: var(--bg-success); border: 0.5px solid var(--border-success); }
  .down { background: var(--bg-danger); border: 0.5px solid var(--border-danger); }
  .result-title { font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
  .up .result-title { color: var(--text-success); }
  .down .result-title { color: var(--text-danger); }
  .price-line { display: flex; justify-content: space-between; align-items: center; background: var(--surface-2); padding: 5px 8px; border-radius: 4px; margin-bottom: 6px; border: 0.5px solid var(--border); }
  .price-label { font-size: 11px; color: var(--text-muted); margin-right: 6px; }
  .val { font-family: var(--font-mono); font-weight: 500; color: var(--text-primary); font-size: 13px; }
  .copy-btn { background: var(--surface-1); border: 0.5px solid var(--border-strong); padding: 3px 7px; font-size: 11px; border-radius: 4px; cursor: pointer; color: var(--text-secondary); }
  .copy-btn:hover { background: var(--surface-0); }
  #toast { visibility: hidden; background: var(--fill-primary); color: var(--on-primary); text-align: center; border-radius: 20px; padding: 8px 16px; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 13px; z-index: 99; }
  #toast.show { visibility: visible; animation: fadein 0.3s, fadeout 0.4s 1.4s; }
  @keyframes fadein { from { bottom:0; opacity:0 } to { bottom:24px; opacity:1 } }
  @keyframes fadeout { from { bottom:24px; opacity:1 } to { bottom:0; opacity:0 } }
</style>

<div class="card">
  <h3>Parallel channel copy</h3>

  <div class="input-row">
    <div class="input-group">
      <label>Harga #1 (asli)</label>
      <input type="number" id="p1" step="any" placeholder="4548.350">
    </div>
    <div class="input-group">
      <label>Harga #2 (asli)</label>
      <input type="number" id="p2" step="any" placeholder="4404.375">
    </div>
  </div>

  <div class="input-group">
    <label>Price offset (lebar kanal)</label>
    <input type="number" id="offset" step="any" placeholder="-183.981">
  </div>

  <div class="stacking-row">
    <label>Jumlah stacking (1–10)</label>
    <input type="number" id="stacking" value="1" min="1" max="10" step="1">
  </div>

  <div class="btn-group">
    <button class="btn-calc" onclick="hitung()">Hitung & tampilkan</button>
    <button class="btn-reset" onclick="resetForm()">Reset</button>
  </div>

  <div class="results-grid" id="results-grid"></div>
</div>

<div id="toast">Tersalin ke clipboard!</div>

<script>
function hitung() {
  const p1 = parseFloat(document.getElementById('p1').value);
  const p2 = parseFloat(document.getElementById('p2').value);
  const offset = parseFloat(document.getElementById('offset').value);
  const stacking = parseInt(document.getElementById('stacking').value) || 1;

  if (isNaN(p1) || isNaN(p2) || isNaN(offset)) {
    alert('Harap masukkan angka yang valid!');
    return;
  }

  const abs = Math.abs(offset);
  const grid = document.getElementById('results-grid');

  let upHTML = `<div class="result-box up"><span class="result-title">↑ ke atas</span>`;
  let downHTML = `<div class="result-box down"><span class="result-title">↓ ke bawah</span>`;

  for (let i = 1; i <= stacking; i++) {
    const upP1 = (p1 + abs * i).toFixed(3);
    const upP2 = (p2 + abs * i).toFixed(3);
    const dnP1 = (p1 - abs * i).toFixed(3);
    const dnP2 = (p2 - abs * i).toFixed(3);

    upHTML += `
      <div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">Layer ${i}</div>
        <div class="price-line">
          <span class="price-label">#1</span><span class="val" id="up1_${i}">${upP1}</span>
          <button class="copy-btn" onclick="copyVal('up1_${i}')">Copy</button>
        </div>
        <div class="price-line">
          <span class="price-label">#2</span><span class="val" id="up2_${i}">${upP2}</span>
          <button class="copy-btn" onclick="copyVal('up2_${i}')">Copy</button>
        </div>
      </div>`;

    downHTML += `
      <div style="margin-bottom:8px">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">Layer ${i}</div>
        <div class="price-line">
          <span class="price-label">#1</span><span class="val" id="dn1_${i}">${dnP1}</span>
          <button class="copy-btn" onclick="copyVal('dn1_${i}')">Copy</button>
        </div>
        <div class="price-line">
          <span class="price-label">#2</span><span class="val" id="dn2_${i}">${dnP2}</span>
          <button class="copy-btn" onclick="copyVal('dn2_${i}')">Copy</button>
        </div>
      </div>`;
  }

  upHTML += `</div>`;
  downHTML += `</div>`;
  grid.innerHTML = upHTML + downHTML;
}

function copyVal(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(showToast);
}

function showToast() {
  const t = document.getElementById('toast');
  t.className = 'show';
  setTimeout(() => { t.className = ''; }, 2000);
}

function resetForm() {
  document.querySelectorAll('input').forEach(inp => {
    if (inp.id === 'stacking') inp.value = '1';
    else inp.value = '';
  });
  document.getElementById('results-grid').innerHTML = '';
}
</script>
